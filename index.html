<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5Stick Floating Marble Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020813;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }
        .header, .footer {
            display: flex;
            justify-content: space-between;
            background: rgba(2, 12, 28, 0.7);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #0f2b5c;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ff3b30;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #ff3b30;
        }
        .indicator.connected {
            background-color: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
        }
        .metric { margin-right: 15px; }
        .x-axis { color: #ff3b30; }
        .y-axis { color: #34c759; }
        .z-axis { color: #007aff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <div id="status-dot" class="indicator"></div>
                <span id="status-text">WAITING FOR M5STICK...</span>
            </div>
            <div>BATTERY: <span id="bat-val">--</span>%</div>
        </div>
        <div class="footer">
            <div>
                <span class="metric"><span class="x-axis">X:</span> <span id="val-x">0.0</span></span>
                <span class="metric"><span class="y-axis">Y:</span> <span id="val-y">0.0</span></span>
                <span class="metric"><span class="z-axis">Z:</span> <span id="val-z">0.0</span></span>
            </div>
            <div>BALL COLOR: <span id="color-name" style="text-transform: uppercase; color: #00ffcc;">CYAN</span></div>
        </div>
    </div>

    <script>
        // --- 1. Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020813);
        // Add subtle environmental fog to make the water fade into the distance
        scene.fog = new THREE.FogExp2(0x020813, 0.08);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Position camera overhead looking down slightly at the water surface
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        // --- 2. Lighting Engine (Crucial for Shiny Marble Looks) ---
        const ambientLight = new THREE.AmbientLight(0x0a1e3f, 1.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(5, 10, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Subtle colored rim light to make the water pop
        const rimLight = new THREE.PointLight(0x00aaff, 3, 15);
        rimLight.position.set(-5, 3, -2);
        scene.add(rimLight);

        // --- 3. Creating the Wavy Liquid (Water Surface) ---
        // A huge flat grid plane with lots of segments so it can bend smoothly into waves
        const waterGeometry = new THREE.PlaneGeometry(30, 30, 64, 64);
        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x004477,
            roughness: 0.1,      // Lower roughness = shinier, more reflective water
            metalness: 0.1,
            transparent: true,
            opacity: 0.85,
            wireframe: false,
            flatShading: true    // Gives it a cool stylized low-poly water surface feel
        });
        const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
        waterMesh.rotation.x = -Math.PI / 2; // Lay it flat horizontally
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // Store original vertex heights so we can manipulate them to make waves
        const positionAttribute = waterGeometry.attributes.position;
        const initialZ = [];
        for (let i = 0; i < positionAttribute.count; i++) {
            initialZ.push(positionAttribute.getZ(i));
        }

        // --- 4. Creating the Shiny Solid Ball (Marble) ---
        const ballGeometry = new THREE.SphereGeometry(0.8, 32, 32);
        const ballMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffcc,      // Initial color
            roughness: 0.05,     // High polish reflection
            metalness: 0.9,      // Metallic reflection look like a glassy marble
        });
        const ballMesh = new THREE.Mesh(ballGeometry, ballMaterial);
        ballMesh.castShadow = true;
        scene.add(ballMesh);

        // --- 5. Tracking Movement & Physics Parameters ---
        let gyroData = { x: 0, y: 0, z: 0 };
        let ballPosition = { x: 0, y: 0, z: 0 };
        let ballVelocity = { x: 0, z: 0 };
        
        const colorMap = {
            white: 0xffffff,
            green: 0x34c759,
            cyan: 0x00ffcc,
            magenta: 0xff00ff,
            yellow: 0xffff00
        };

        // --- 6. The Real-time Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // A. Update Water Wave Mathematical Simulation
            for (let i = 0; i < positionAttribute.count; i++) {
                const x = positionAttribute.getX(i);
                const y = positionAttribute.getY(i);

                // Complex wave math: combine sine waves rolling across different directions
                const wave1 = Math.sin(x * 0.5 + time * 2.0) * 0.15;
                const wave2 = Math.cos(y * 0.4 + time * 1.5) * 0.15;
                const wave3 = Math.sin((x + y) * 0.3 + time * 2.5) * 0.10;

                positionAttribute.setZ(i, initialZ[i] + wave1 + wave2 + wave3);
            }
            waterGeometry.computeVertexNormals();
            waterGeometry.attributes.position.needsUpdate = true;

            // B. Calculate Ball Physics (Translate Tilting into Movement)
            // Treat Y-gyro as steering Left/Right (X-axis in 3D)
            // Treat X-gyro as steering Up/Down (Z-axis in 3D)
            const tiltForceX = gyroData.y * 0.0008; 
            const tiltForceZ = gyroData.x * 0.0008;

            // Apply acceleration forces
            ballVelocity.x += tiltForceX;
            ballVelocity.z += tiltForceZ;

            // Apply water drag/friction to slowly stop the ball when you aren't tilting
            ballVelocity.x *= 0.95;
            ballVelocity.z *= 0.95;

            // Update positions based on velocity calculations
            ballPosition.x += ballVelocity.x;
            ballPosition.z += ballVelocity.z;

            // Bound checking: Don't let the ball roll completely off the screen
            ballPosition.x = Math.max(-6, Math.min(6, ballPosition.x));
            ballPosition.z = Math.max(-5, Math.min(3, ballPosition.z));

            // C. Apply Rotations directly from the Gyro Values
            ballMesh.rotation.x += (gyroData.x * 0.01745) / 60;
            ballMesh.rotation.y += (gyroData.y * 0.01745) / 60;
            ballMesh.rotation.z += (gyroData.z * 0.01745) / 60;

            // D. Set Final Ball Position Matrix
            // Calculate height offset dynamically so it bobs cleanly on top of the waves
            const currentWaveHeight = Math.sin(ballPosition.x * 0.5 + time * 2.0) * 0.15 + 
                                      Math.cos(ballPosition.z * 0.4 + time * 1.5) * 0.15;
                                      
            ballMesh.position.x = ballPosition.x;
            ballMesh.position.z = ballPosition.z;
            ballMesh.position.y = currentWaveHeight + 0.1; // Float adjustments

            renderer.render(scene, camera);
        }
        animate();

        // Canvas Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 7. MQTT Live Data Subsystem Connection ---
        const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt');

        client.on('connect', () => {
            document.getElementById('status-dot').classList.add('connected');
            document.getElementById('status-text').innerText = "MARBLE PIPELINE ACTIVE";
            client.subscribe("m5stick/gyro/mohxarei");
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                
                // Store live readings directly inside global objects
                gyroData.x = data.x || 0;
                gyroData.y = data.y || 0;
                gyroData.z = data.z || 0;

                // Update text overlays
                document.getElementById('val-x').innerText = gyroData.x.toFixed(1);
                document.getElementById('val-y').innerText = gyroData.y.toFixed(1);
                document.getElementById('val-z').innerText = gyroData.z.toFixed(1);
                document.getElementById('bat-val').innerText = data.battery || '--';
                
                // Update Material Color on Button Press triggers
                if (data.color && colorMap[data.color]) {
                    ballMesh.material.color.setHex(colorMap[data.color]);
                    document.getElementById('color-name').innerText = data.color;
                    document.getElementById('color-name').style.color = data.color;
                }
            } catch (err) {
                console.error("Data packet error:", err);
            }
        });
    </script>
</body>
</html>
